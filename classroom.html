<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classroom Mode | VibeCoding</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; }
</style>
</head>

<body class="bg-[#191022] text-white">

<!-- Navbar -->
<header class="border-b border-white/10">
  <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
    <h1 class="text-xl font-bold text-purple-500">VibeCoding</h1>
    <nav class="flex gap-6 text-sm text-gray-300">
      <a href="index.html" class="hover:text-white">Home</a>
      <a href="dashboard.html" class="hover:text-white">Dashboard</a>
      <a href="leaderboard.html" class="hover:text-white">Leaderboard</a>
    </nav>
  </div>
</header>

<div class="max-w-7xl mx-auto px-6 py-10">

  <h2 class="text-3xl font-extrabold mb-8">Classroom Mode</h2>

  <!-- Stats -->
  <div class="grid md:grid-cols-3 gap-6 mb-10">

    <div class="bg-white/5 border border-white/10 rounded-xl p-6">
      <div class="text-gray-400 text-sm">Total Students</div>
      <div id="totalStudents" class="text-2xl font-bold mt-1"></div>
    </div>

    <div class="bg-white/5 border border-white/10 rounded-xl p-6">
      <div class="text-gray-400 text-sm">Average XP</div>
      <div id="avgXP" class="text-2xl font-bold mt-1 text-purple-400"></div>
    </div>

    <div class="bg-white/5 border border-white/10 rounded-xl p-6">
      <div class="text-gray-400 text-sm">Active Streaks</div>
      <div id="activeStreaks" class="text-2xl font-bold mt-1"></div>
    </div>

  </div>

  <!-- Assign Quest -->
  <div class="bg-white/5 border border-white/10 rounded-xl p-6 mb-10">
    <h3 class="text-xl font-bold mb-4">Create Classroom Quest</h3>

    <div class="grid md:grid-cols-3 gap-4">
      <input id="questTitle" placeholder="Quest title"
        class="bg-[#0f172a] border border-white/10 rounded px-4 py-2">

      <input id="questXP" type="number" placeholder="XP reward"
        class="bg-[#0f172a] border border-white/10 rounded px-4 py-2">

      <button onclick="assignQuest()"
        class="bg-purple-600 hover:bg-purple-700 rounded px-4 py-2 font-semibold">
        Assign to Class
      </button>
    </div>

    <div id="questMessage" class="text-green-400 text-sm mt-3"></div>
  </div>

  <!-- Student Table -->
  <div class="bg-white/5 border border-white/10 rounded-xl overflow-hidden">
    <table class="w-full text-left">
      <thead class="border-b border-white/10 text-gray-400 text-sm">
        <tr>
          <th class="p-4">Student</th>
          <th class="p-4">Level</th>
          <th class="p-4">XP</th>
          <th class="p-4">Streak</th>
          <th class="p-4">Action</th>
        </tr>
      </thead>
      <tbody id="studentBody"></tbody>
    </table>
  </div>

</div>

<script>

// Hardcoded students
let students = [
  { id: 1, name: "Tanmay Sharma", xp: 1240, level: 5, streak: 7 },
  { id: 2, name: "Aarav Mehta", xp: 980, level: 4, streak: 5 },
  { id: 3, name: "Riya Patel", xp: 1560, level: 6, streak: 10 },
  { id: 4, name: "Kabir Singh", xp: 720, level: 3, streak: 3 },
  { id: 5, name: "Neha Verma", xp: 1840, level: 7, streak: 12 }
];

// Render stats
function renderStats() {
  document.getElementById("totalStudents").textContent = students.length;

  const avg = Math.floor(students.reduce((a,b)=>a+b.xp,0) / students.length);
  document.getElementById("avgXP").textContent = avg;

  const active = students.filter(s => s.streak > 0).length;
  document.getElementById("activeStreaks").textContent = active;
}

// Render table
function renderStudents() {
  const body = document.getElementById("studentBody");
  body.innerHTML = "";

  students.forEach(s => {
    body.innerHTML += `
      <tr class="border-b border-white/5">
        <td class="p-4">${s.name}</td>
        <td class="p-4">Lvl ${s.level}</td>
        <td class="p-4 text-purple-400 font-semibold">${s.xp}</td>
        <td class="p-4">${s.streak}</td>
        <td class="p-4">
          <button onclick="giveBonus(${s.id})"
            class="text-sm bg-white/10 hover:bg-white/20 px-3 py-1 rounded">
            +50 XP
          </button>
        </td>
      </tr>
    `;
  });
}

// Give bonus XP
window.giveBonus = function(id) {
  const student = students.find(s => s.id === id);
  student.xp += 50;

  fetch("https://hook.make.com/YOUR_WEBHOOK_URL", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      type: "bonus",
      student: student.name,
      xp: 50,
      totalXP: student.xp
    })
  });

  renderStudents();
  renderStats();
};

// Assign quest to class
window.assignQuest = function() {
  const title = document.getElementById("questTitle").value;
  const xp = document.getElementById("questXP").value;

  if (!title || !xp) return;

  document.getElementById("questMessage").textContent =
    `Quest "${title}" assigned to class (${xp} XP)`;

  fetch("https://hook.make.com/YOUR_WEBHOOK_URL", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      type: "new_quest",
      title,
      xp,
      students: students.length
    })
  });

  document.getElementById("questTitle").value = "";
  document.getElementById("questXP").value = "";
};

renderStudents();
renderStats();

</script>

</body>
</html>
