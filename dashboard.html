<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | VibeCoding</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; }
</style>
</head>

<body class="bg-[#191022] text-white">

<!-- Navbar -->
<header class="border-b border-white/10">
  <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
    <h1 class="text-xl font-bold text-purple-500">VibeCoding</h1>
    <nav class="flex gap-6 text-sm text-gray-300">
      <a href="index.html" class="hover:text-white">Home</a>
      <a href="leaderboard.html" class="hover:text-white">Leaderboard</a>
      <a href="classroom.html" class="hover:text-white">Classroom</a>
    </nav>
  </div>
</header>

<div class="max-w-7xl mx-auto px-6 py-10">

  <!-- User Card -->
  <div id="userCard" class="bg-white/5 border border-white/10 rounded-xl p-6 mb-8">
    <h2 class="text-2xl font-bold mb-4">Welcome back</h2>
    <div class="grid md:grid-cols-3 gap-6 text-sm">
      <div>
        <div class="text-gray-400">Level</div>
        <div id="level" class="text-xl font-bold"></div>
      </div>
      <div>
        <div class="text-gray-400">XP</div>
        <div id="xp" class="text-xl font-bold text-purple-400"></div>
      </div>
      <div>
        <div class="text-gray-400">Streak</div>
        <div id="streak" class="text-xl font-bold"></div>
      </div>
    </div>
  </div>

  <!-- Quests -->
  <div class="mb-10">
    <h3 class="text-xl font-bold mb-4">Today's Quests</h3>

    <div id="quests" class="grid md:grid-cols-3 gap-6">

      <div class="bg-white/5 border border-white/10 p-5 rounded-lg">
        <h4 class="font-semibold">Solve 2 DSA Problems</h4>
        <p class="text-gray-400 text-sm mt-1">Reward: 100 XP</p>
        <button onclick="completeQuest(100)" class="mt-4 bg-purple-600 px-4 py-2 rounded hover:bg-purple-700">
          Complete
        </button>
      </div>

      <div class="bg-white/5 border border-white/10 p-5 rounded-lg">
        <h4 class="font-semibold">Complete React Lesson</h4>
        <p class="text-gray-400 text-sm mt-1">Reward: 150 XP</p>
        <button onclick="completeQuest(150)" class="mt-4 bg-purple-600 px-4 py-2 rounded hover:bg-purple-700">
          Complete
        </button>
      </div>

      <div class="bg-white/5 border border-white/10 p-5 rounded-lg">
        <h4 class="font-semibold">Submit Assignment</h4>
        <p class="text-gray-400 text-sm mt-1">Reward: 80 XP</p>
        <button onclick="completeQuest(80)" class="mt-4 bg-purple-600 px-4 py-2 rounded hover:bg-purple-700">
          Complete
        </button>
      </div>

    </div>
  </div>

  <!-- Progress Bar -->
  <div class="bg-white/5 border border-white/10 rounded-xl p-6">
    <h3 class="font-semibold mb-3">Progress to Next Level</h3>
    <div class="w-full bg-white/10 rounded-full h-4">
      <div id="progressBar" class="bg-purple-500 h-4 rounded-full" style="width:0%"></div>
    </div>
  </div>

</div>

<!-- Scripts -->
<script type="module">

// Hardcoded students (same as students.js)
const students = [
  { id: 1, name: "Tanmay Sharma", xp: 1240, level: 5, streak: 7 },
  { id: 2, name: "Aarav Mehta", xp: 980, level: 4, streak: 5 },
  { id: 3, name: "Riya Patel", xp: 1560, level: 6, streak: 10 },
  { id: 4, name: "Kabir Singh", xp: 720, level: 3, streak: 3 },
  { id: 5, name: "Neha Verma", xp: 1840, level: 7, streak: 12 }
];

// Current user (Tanmay)
let user = students[0];

function renderUser() {
  document.getElementById("level").textContent = user.level;
  document.getElementById("xp").textContent = user.xp;
  document.getElementById("streak").textContent = user.streak;

  // Progress calculation (1000 XP per level)
  const progress = (user.xp % 1000) / 10;
  document.getElementById("progressBar").style.width = progress + "%";
}

window.completeQuest = async function(xpEarned) {
  user.xp += xpEarned;

  // Level up logic
  if (user.xp >= user.level * 1000) {
    user.level++;
    alert("Level Up! You reached level " + user.level);
  }

  renderUser();

  // Webhook (Make / n8n)
  fetch("https://hook.make.com/YOUR_WEBHOOK_URL", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      student: user.name,
      xpEarned,
      totalXP: user.xp,
      time: new Date()
    })
  });
};

renderUser();

</script>

</body>
</html>
